name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # 23:30 Asia/Seoul. The site is rebuilt from the newest available market data.
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build nightly recommendation data
        run: |
          python -m stock_finder.cli market --out-dir site/data --domestic-limit 250 --years 3
          python -m stock_finder.cli daily --watchlist config/watchlist.csv --out-dir site/data

      - name: Commit generated market report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f site/data/market_report.json
          git diff --cached --quiet || git commit -m "Update market report [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
